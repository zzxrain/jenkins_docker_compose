jenkins:
  systemMessage: "Jenkins configured by JCasC for local Docker Compose CI environment."

  # Keep the controller dedicated to orchestration; all builds should run on agents.
  numExecutors: 0

  mode: NORMAL

  securityRealm:
    local:
      # Disable self-signup so identities are created intentionally during lab exercises.
      allowsSignup: false
      users:
        - id: "${JENKINS_ADMIN_ID}"
          password: "${JENKINS_ADMIN_PASSWORD}"

  authorizationStrategy:
    globalMatrix:
      entries:
        # Grant full administration only to the configured bootstrap admin user.
        - user:
            name: "${JENKINS_ADMIN_ID}"
            permissions:
              - "Overall/Administer"
        # Authenticated users get read-only access by default; grant job/folder rights explicitly later.
        - group:
            name: "authenticated"
            permissions:
              - "Overall/Read"

  # Enable remoting security to reduce the attack surface of inbound/agent communication.
  remotingSecurity:
    enabled: true

  crumbIssuer:
    standard:
      # Excluding the client IP avoids CSRF crumb mismatches behind reverse proxies or NAT.
      excludeClientIPFromCrumb: true

  nodes:
    # Generic Linux agent for ordinary CI tasks that do not need ALM tooling or Docker socket access.
    - permanent:
        name: "ci-arm64-general"
        nodeDescription: "General-purpose ARM64 Linux SSH agent for normal CI tasks."
        remoteFS: "/home/jenkins/agent"
        numExecutors: 1
        labelString: "ci arm64 linux general"
        mode: EXCLUSIVE
        retentionStrategy: "always"
        launcher:
          sSHLauncher:
            host: "ci-arm64-general"
            port: 22
            credentialsId: "jenkins-agent-ssh-key"
            launchTimeoutSeconds: 60
            maxNumRetries: 3
            retryWaitTime: 15
            sshHostKeyVerificationStrategy:
              # Production-like SSH host key verification:
              # Jenkins will not blindly trust this SSH agent on the first connection.
              # An administrator must approve the presented SSH host key in the Jenkins UI.
              # If the agent container is recreated and its host key changes, Jenkins will block
              # the connection again until the new key is explicitly reviewed and trusted.
              manuallyTrustedKeyVerificationStrategy:
                requireInitialManualTrust: true

    # ALM/PLM agent isolates Windchill and Codebeamer integration scripts, SDKs, and credentials by label.
    - permanent:
        name: "ci-arm64-alm"
        nodeDescription: "ARM64 Linux SSH agent for ALM/PLM automation tasks such as Codebeamer and Windchill API integration."
        remoteFS: "/home/jenkins/agent"
        numExecutors: 1
        labelString: "ci arm64 linux alm codebeamer windchill"
        mode: EXCLUSIVE
        retentionStrategy: "always"
        launcher:
          sSHLauncher:
            host: "ci-arm64-alm"
            port: 22
            credentialsId: "jenkins-agent-ssh-key"
            launchTimeoutSeconds: 60
            maxNumRetries: 3
            retryWaitTime: 15
            sshHostKeyVerificationStrategy:
              # Production-like SSH host key verification:
              # Jenkins will not blindly trust this SSH agent on the first connection.
              # An administrator must approve the presented SSH host key in the Jenkins UI.
              # If the agent container is recreated and its host key changes, Jenkins will block
              # the connection again until the new key is explicitly reviewed and trusted.
              manuallyTrustedKeyVerificationStrategy:
                requireInitialManualTrust: true

    # Docker-capable agent is separated because Docker socket access is a high-trust capability.
    - permanent:
        name: "ci-arm64-docker"
        nodeDescription: "ARM64 Linux SSH agent with Docker CLI, Docker Compose plugin and Buildx support."
        remoteFS: "/home/jenkins/agent"
        numExecutors: 1
        labelString: "ci arm64 linux docker buildx"
        mode: EXCLUSIVE
        retentionStrategy: "always"
        launcher:
          sSHLauncher:
            host: "ci-arm64-docker"
            port: 22
            credentialsId: "jenkins-agent-ssh-key"
            launchTimeoutSeconds: 60
            maxNumRetries: 3
            retryWaitTime: 15
            sshHostKeyVerificationStrategy:
              # Production-like SSH host key verification:
              # This Docker-capable agent has elevated risk because it mounts /var/run/docker.sock.
              # Jenkins must not silently trust a new or changed SSH host key for this agent.
              # An administrator must approve the presented host key before the controller connects.
              manuallyTrustedKeyVerificationStrategy:
                requireInitialManualTrust: true

credentials:
  system:
    domainCredentials:
      - credentials:
          - basicSSHUserPrivateKey:
              scope: SYSTEM
              id: "jenkins-agent-ssh-key"
              username: "jenkins"
              description: "SSH private key for static Docker SSH agents"
              privateKeySource:
                directEntry:
                  # Read the key from a Docker secret so it is not stored in JCasC or environment variables.
                  privateKey: "${readFile:/run/secrets/jenkins_agent_key}"

unclassified:
  location:
    # External URL is environment-driven so local TLS, DNS aliases, or enterprise proxies can reuse the same JCasC.
    url: "${JENKINS_URL}"
